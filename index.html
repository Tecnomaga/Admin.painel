<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Catcher Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f4c542;
            --font: 'Press Start 2P', cursive;
            --bg-dark: #0a1020;
            --bg-panel: #1a1f2e;
            --text-primary: #ffffff;
            --text-secondary: #dde;
            --green: #5a9c3f;
            --red: #d94040;
            --blue: #3a7bd5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            image-rendering: pixelated;
        }
        .starfield {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at center, #0a1628 0%, #06080d 70%);
        }
        .container {
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        h1 {
            color: var(--gold);
            text-align: center;
            font-size: 1rem;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .login-box, .panel {
            background: var(--bg-panel);
            border: 3px solid #4a5a7e;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 8px 8px 0 #000;
            margin-top: 20px;
        }
        .login-box h3 {
            color: var(--gold);
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        input, button {
            padding: 14px 16px;
            margin: 8px 0;
            width: 100%;
            box-sizing: border-box;
            border: 3px solid #3a4a5e;
            font-family: var(--font);
            font-size: 0.7rem;
            outline: none;
        }
        input {
            background: #0a1520;
            color: #e0e8f0;
        }
        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(244,197,66,0.3);
        }
        button {
            background: var(--red);
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 3px 3px 0 #000;
            transition: all 0.1s;
        }
        button:hover { background: #c03030; }
        button:active { box-shadow: 1px 1px 0 #000; transform: translate(2px,2px); }
        button.gold { background: linear-gradient(180deg, var(--gold), #a07808); border-color: #7a5800; color: #1a1a20; }
        button.green { background: linear-gradient(180deg, var(--green), #2d6a20); border-color: #1a4a10; }
        button.small { width: auto; padding: 8px 14px; font-size: 0.55rem; }
        .error { color: #e0434f; font-size: 0.55rem; margin-top: 5px; }
        .logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logout a { color: #aaccff; cursor: pointer; text-decoration: underline; font-size: 0.55rem; }
        .logout a:hover { color: #fff; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            min-width: 200px;
            margin: 0;
            padding: 12px 14px;
            font-size: 0.6rem;
        }
        .search-box button {
            width: auto;
            margin: 0;
            padding: 12px 18px;
            font-size: 0.6rem;
        }
        .count-badge {
            display: inline-block;
            background: var(--gold);
            color: #000;
            padding: 4px 10px;
            font-size: 0.5rem;
            margin-left: 8px;
        }
        .tx-card {
            background: #1a2a3a;
            border: 2px solid #3a4a5e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            font-size: 0.45rem;
            line-height: 1.8;
        }
        .tx-card .tx-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 8px;
            color: var(--gold);
        }
        .tx-card .tx-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 2px 0;
        }
        .tx-card .tx-label {
            color: #aaa;
            font-size: 0.4rem;
        }
        .tx-card .tx-value {
            color: #fff;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }
        .tx-card .tx-hash {
            color: #aaccff;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.4rem;
            background: #0a1520;
            padding: 6px;
            border-radius: 4px;
            margin: 4px 0;
            line-height: 1.4;
        }
        .tx-card .status {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.45rem;
        }
        .status.pending { color: #f4c542; }
        .status.approved { color: var(--green); }
        .status.rejected { color: #e0434f; }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .actions button {
            padding: 8px 14px;
            font-size: 0.5rem;
            margin: 0;
            width: auto;
        }
        .no-results {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 0.55rem;
        }
        @media (max-width: 600px) {
            h1 { font-size: 0.8rem; }
            .tx-card .tx-value { max-width: 100%; text-align: left; }
        }
    </style>
</head>
<body>
<div class="starfield"></div>
<div class="container">
    <h1>🎮 Gram Catcher Admin</h1>

    <div id="loginScreen" class="login-box">
        <h3>🔐 Acesso Administrativo</h3>
        <input type="password" id="password" placeholder="Senha administrativa" />
        <button onclick="doLogin()" class="gold">Entrar</button>
        <p class="error" id="loginError"></p>
    </div>

    <div id="panel" class="panel" style="display:none;">
        <div class="logout">
            <span style="font-size:0.5rem;">🔐 Admin Logado</span>
            <a onclick="logout()">Sair</a>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Pesquisar por Hash, ID ou Usuário..." onkeyup="handleSearchKey(event)" />
            <button onclick="searchTransactions()" class="gold small">🔍 Buscar</button>
            <button onclick="clearSearch()" class="small" style="background:#555;border-color:#444;">✕ Limpar</button>
            <button onclick="loadTransactions()" class="small" style="background:var(--blue);border-color:#1a4a7a;">🔄 Atualizar</button>
        </div>

        <p class="error" id="txError"></p>
        <p style="font-size:0.45rem;margin-bottom:10px;">
            Transações pendentes: <span id="pendingCount" class="count-badge">0</span>
        </p>

        <div id="txList"></div>
        <div class="no-results" id="noResults" style="display:none;">Nenhuma transação encontrada.</div>
    </div>
</div>

<script>
    const API_URL = 'https://gramcatcher-back-end.onrender.com';
    let authToken = localStorage.getItem('gramcatcher_admin_token') || '';

    async function doLogin() {
        const pass = document.getElementById('password').value.trim();
        if (!pass) { document.getElementById('loginError').textContent = 'Digite a senha.'; return; }
        try {
            const res = await fetch(`${API_URL}/api/admin/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Falha na autenticação'); }
            const data = await res.json();
            authToken = data.token;
            localStorage.setItem('gramcatcher_admin_token', authToken);
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            loadTransactions();
        } catch (e) { document.getElementById('loginError').textContent = e.message; }
    }

    function logout() {
        authToken = '';
        localStorage.removeItem('gramcatcher_admin_token');
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('panel').style.display = 'none';
        document.getElementById('password').value = '';
    }

    async function loadTransactions(searchTerm = '') {
        const errorEl = document.getElementById('txError');
        errorEl.textContent = '';
        if (!authToken) { logout(); return; }
        try {
            let url = `${API_URL}/api/admin/transactions`;
            if (searchTerm) url += `?search=${encodeURIComponent(searchTerm)}`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${authToken}` } });
            if (res.status === 403) { logout(); throw new Error('Sessão expirada.'); }
            if (!res.ok) { const data = await res.json(); throw new Error(data.error || `Erro ${res.status}`); }
            const transactions = await res.json();
            renderList(transactions);
            document.getElementById('pendingCount').textContent = transactions.length;
        } catch (e) { errorEl.textContent = e.message; }
    }

    function handleSearchKey(e) { if (e.key === 'Enter') searchTransactions(); }
    function searchTransactions() { const term = document.getElementById('searchInput').value.trim(); if (!term) { loadTransactions(); return; } loadTransactions(term); }
    function clearSearch() { document.getElementById('searchInput').value = ''; loadTransactions(); }

    function renderList(transactions) {
        const container = document.getElementById('txList');
        const noResults = document.getElementById('noResults');
        container.innerHTML = '';

        if (!transactions || transactions.length === 0) {
            noResults.style.display = 'block';
            return;
        }
        noResults.style.display = 'none';

        transactions.forEach(tx => {
            const date = new Date(tx.createdAt).toLocaleString('pt-BR', {
                day: '2-digit', month: '2-digit', year: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
            const isDeposit = tx.type === 'deposit';

            const card = document.createElement('div');
            card.className = 'tx-card';

            let html = `<div class="tx-header">`;
            html += `<span>${date}</span>`;
            html += `<span class="status ${tx.status}">${tx.status === 'pending' ? '⏳ Pendente' : tx.status}</span>`;
            html += `</div>`;

            html += `<div class="tx-row"><span class="tx-label">Jogador:</span><span class="tx-value">${tx.username || '-'} (ID: ${tx.telegramId})</span></div>`;
            html += `<div class="tx-row"><span class="tx-label">Tipo:</span><span class="tx-value" style="color:${isDeposit ? '#5a9c3f' : '#e0434f'}">${isDeposit ? '📥 Depósito' : '💸 Saque'}</span></div>`;
            html += `<div class="tx-row"><span class="tx-label">Valor:</span><span class="tx-value" style="color:#ffd700;">${tx.amount.toFixed(2)} GRAM</span></div>`;

            if (isDeposit && tx.txHash) {
                html += `<div class="tx-label" style="margin-top:6px;">Hash da Transação:</div>`;
                html += `<div class="tx-hash">${tx.txHash}</div>`;
                html += `<div style="font-size:0.35rem;margin-top:2px;"><a href="https://tonscan.org/tx/${tx.txHash}" target="_blank" style="color:#aaccff;">🔗 Ver no explorer</a></div>`;
            }

            if (!isDeposit && tx.walletAddress) {
                html += `<div class="tx-row"><span class="tx-label">Carteira destino:</span><span class="tx-value" style="word-break:break-all;">${tx.walletAddress}</span></div>`;
            }

            if (tx.fee) {
                html += `<div class="tx-row"><span class="tx-label">Taxa:</span><span class="tx-value">${tx.fee.toFixed(2)} GRAM</span></div>`;
            }

            html += `<div class="actions">`;
            html += `<button onclick="processTx('${tx._id}', 'approved')" class="green">✅ Aprovar</button>`;
            html += `<button onclick="processTx('${tx._id}', 'rejected')">❌ Rejeitar</button>`;
            html += `</div>`;

            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    async function processTx(id, status) {
        const action = status === 'approved' ? 'APROVAR' : 'REJEITAR';
        if (!confirm(`⚠️ Confirmar ${action} esta transação?`)) return;
        try {
            const res = await fetch(`${API_URL}/api/admin/transaction/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify({ status })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro ao processar');
            alert(`✅ Transação ${status === 'approved' ? 'aprovada' : 'rejeitada'}!`);
            const searchTerm = document.getElementById('searchInput').value.trim();
            loadTransactions(searchTerm);
        } catch (e) { alert('❌ ' + e.message); }
    }

    window.addEventListener('load', () => {
        if (authToken) {
            fetch(`${API_URL}/api/admin/transactions`, { headers: { 'Authorization': `Bearer ${authToken}` } })
            .then(res => {
                if (res.ok) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('panel').style.display = 'block';
                    loadTransactions();
                } else { logout(); }
            }).catch(() => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadTransactions();
            });
        }
    });
</script>
</body>
</html>
