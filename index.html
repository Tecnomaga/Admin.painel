<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Catcher Admin</title>
    <style>
        body {
            background: #1a1f2e; color: #e0e8f0; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0; padding: 20px;
        }
        .container { max-width: 700px; width: 100%; }
        h1 { color: #f4c542; text-align: center; }
        .login-box, .panel {
            background: #2a3040; border: 2px solid #4a5a7e; padding: 20px;
            border-radius: 8px; margin-top: 20px;
        }
        input, button {
            padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box;
            border: none; border-radius: 4px; font-size: 16px;
        }
        input { background: #0a1520; color: #e0e8f0; border: 1px solid #3a4a5e; }
        button {
            background: #d94040; color: white; font-weight: bold; cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #b03030; }
        .error { color: #e0434f; font-size: 14px; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #4a5a7e; padding: 8px; text-align: left; font-size: 14px; }
        th { background: #2a3a4e; }
        .status { font-weight: bold; }
        .pending { color: #f4c542; }
        .approved { color: #5a9c3f; }
        .rejected { color: #e0434f; }
        .actions button { margin-right: 5px; width: auto; padding: 6px 12px; font-size: 14px; }
        .logout { text-align: right; margin-bottom: 10px; }
        .logout a { color: #aaccff; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gram Catcher Admin</h1>

        <div id="loginScreen" class="login-box">
            <h3>Login</h3>
            <input type="text" id="username" placeholder="Usuário" />
            <input type="password" id="password" placeholder="Senha administrativa" />
            <button onclick="doLogin()">Entrar</button>
            <p class="error" id="loginError"></p>
        </div>

        <div id="panel" class="panel" style="display:none;">
            <div class="logout"><a onclick="logout()">Sair</a></div>
            <button onclick="loadTransactions()">Atualizar transações</button>
            <p class="error" id="txError"></p>
            <table id="txTable">
                <thead>
                    <tr>
                        <th>Jogador</th>
                        <th>Telegram ID</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Hash / Carteira</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://gramcatcher-back-end.onrender.com';
        let adminKey = '';

        function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) {
                document.getElementById('loginError').textContent = 'Preencha todos os campos.';
                return;
            }
            adminKey = pass;
            loadTransactions(true);
        }

        async function loadTransactions(isLogin = false) {
            const errorEl = document.getElementById(isLogin ? 'loginError' : 'txError');
            errorEl.textContent = '';
            try {
                const res = await fetch(`${API_URL}/api/admin/transactions`, {
                    headers: { 'x-admin-key': adminKey }
                });
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || `Erro ${res.status}`);
                }
                const transactions = await res.json();
                if (isLogin) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('panel').style.display = 'block';
                }
                renderTable(transactions);
            } catch (e) {
                errorEl.textContent = e.message;
                if (isLogin) adminKey = '';
            }
        }

        function renderTable(transactions) {
            const tbody = document.querySelector('#txTable tbody');
            tbody.innerHTML = '';
            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">Nenhuma transação pendente.</td></tr>';
                return;
            }
            transactions.forEach(tx => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${tx.username || '-'}</td>
                    <td>${tx.telegramId}</td>
                    <td>${tx.type === 'deposit' ? 'Depósito' : 'Saque'}</td>
                    <td>${tx.amount.toFixed(2)}</td>
                    <td>${tx.txHash || tx.walletAddress || '-'}</td>
                    <td class="status ${tx.status}">${tx.status}</td>
                    <td class="actions">
                        <button onclick="processTx('${tx._id}', 'approved')">Aprovar</button>
                        <button onclick="processTx('${tx._id}', 'rejected')">Rejeitar</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function processTx(id, status) {
            if (!confirm(`Confirmar ${status === 'approved' ? 'aprovação' : 'rejeição'}?`)) return;
            try {
                const res = await fetch(`${API_URL}/api/admin/transaction/${id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-key': adminKey
                    },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erro ao processar');
                alert('Transação processada!');
                loadTransactions();
            } catch (e) {
                alert(e.message);
            }
        }

        function logout() {
            adminKey = '';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('panel').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
