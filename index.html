<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Catcher Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f4c542;
            --font: 'Press Start 2P', cursive;
            --bg-dark: #0a1020;
            --bg-panel: #1a1f2e;
            --bg-modal: #1e2e42;
            --text-primary: #ffffff;
            --text-secondary: #dde;
            --green: #5a9c3f;
            --red: #d94040;
            --blue: #3a7bd5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            image-rendering: pixelated;
        }
        .starfield {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at center, #0a1628 0%, #06080d 70%);
        }
        .starfield::before {
            content: ''; position: absolute; inset: 0;
            background-image: 
                radial-gradient(1px 1px at 20% 30%, #fff8, transparent),
                radial-gradient(1px 1px at 50% 60%, #fff6, transparent),
                radial-gradient(1.5px 1.5px at 70% 20%, #fff9, transparent),
                radial-gradient(1px 1px at 90% 10%, #fff7, transparent),
                radial-gradient(1.5px 1.5px at 40% 80%, #fff5, transparent);
            animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { 0%{opacity:0.6} 50%{opacity:1} 100%{opacity:0.7} }
        .container {
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        h1 {
            color: var(--gold);
            text-align: center;
            font-size: 1.2rem;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .login-box, .panel {
            background: var(--bg-panel);
            border: 3px solid #4a5a7e;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 8px 8px 0 #000;
            margin-top: 20px;
        }
        .login-box h3 {
            color: var(--gold);
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        input, button, select {
            padding: 14px 16px;
            margin: 8px 0;
            width: 100%;
            box-sizing: border-box;
            border: 3px solid #3a4a5e;
            font-family: var(--font);
            font-size: 0.7rem;
            outline: none;
        }
        input {
            background: #0a1520;
            color: #e0e8f0;
        }
        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(244,197,66,0.3);
        }
        button {
            background: var(--red);
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 3px 3px 0 #000;
            transition: all 0.1s;
        }
        button:hover {
            background: #c03030;
        }
        button:active {
            box-shadow: 1px 1px 0 #000;
            transform: translate(2px,2px);
        }
        button.gold {
            background: linear-gradient(180deg, var(--gold), #a07808);
            border-color: #7a5800;
            color: #1a1a20;
        }
        button.green {
            background: linear-gradient(180deg, var(--green), #2d6a20);
            border-color: #1a4a10;
        }
        button.small {
            width: auto;
            padding: 8px 14px;
            font-size: 0.55rem;
        }
        .error {
            color: #e0434f;
            font-size: 0.55rem;
            margin-top: 5px;
        }
        .success {
            color: var(--green);
            font-size: 0.55rem;
        }
        .logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logout a {
            color: #aaccff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.55rem;
        }
        .logout a:hover {
            color: #fff;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            min-width: 200px;
            margin: 0;
            padding: 12px 14px;
            font-size: 0.6rem;
        }
        .search-box button {
            width: auto;
            margin: 0;
            padding: 12px 18px;
            font-size: 0.6rem;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 15px;
            font-size: 0.55rem;
            overflow-x: auto;
            display: block;
        }
        th {
            background: #2a3a4e;
            padding: 12px 8px;
            text-align: left;
            font-size: 0.5rem;
            color: var(--gold);
            white-space: nowrap;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #3a4a5e;
            white-space: nowrap;
            font-size: 0.5rem;
        }
        tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .status {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.45rem;
        }
        .status.pending { color: #f4c542; }
        .status.approved { color: var(--green); }
        .status.rejected { color: #e0434f; }
        .actions {
            display: flex;
            gap: 6px;
        }
        .actions button {
            padding: 6px 12px;
            font-size: 0.45rem;
            margin: 0;
            width: auto;
        }
        .no-results {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 0.55rem;
        }
        .count-badge {
            display: inline-block;
            background: var(--gold);
            color: #000;
            padding: 4px 10px;
            font-size: 0.5rem;
            margin-left: 8px;
        }
        @media (max-width: 600px) {
            table { font-size: 0.45rem; }
            th, td { padding: 8px 6px; }
            .actions button { padding: 5px 8px; font-size: 0.4rem; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="starfield"></div>
<div class="container">
    <h1>🎮 Gram Catcher Admin</h1>

    <!-- Tela de login -->
    <div id="loginScreen" class="login-box">
        <h3>🔐 Acesso Administrativo</h3>
        <input type="text" id="username" placeholder="Usuário" />
        <input type="password" id="password" placeholder="Senha administrativa" />
        <button onclick="doLogin()" class="gold">Entrar</button>
        <p class="error" id="loginError"></p>
    </div>

    <!-- Painel (oculto até login) -->
    <div id="panel" class="panel" style="display:none;">
        <div class="logout">
            <span style="font-size:0.5rem;">🔐 Admin Logado</span>
            <a onclick="logout()">Sair</a>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Pesquisar por Hash, ID ou Usuário..." onkeyup="handleSearchKey(event)" />
            <button onclick="searchTransactions()" class="gold small">🔍 Buscar</button>
            <button onclick="clearSearch()" class="small" style="background:#555;border-color:#444;">✕ Limpar</button>
            <button onclick="loadTransactions()" class="small" style="background:var(--blue);border-color:#1a4a7a;">🔄 Atualizar</button>
        </div>

        <p class="error" id="txError"></p>
        <p style="font-size:0.45rem;margin-bottom:10px;">
            Transações pendentes: <span id="pendingCount" class="count-badge">0</span>
        </p>

        <div style="overflow-x:auto;">
            <table id="txTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Jogador</th>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Hash / Carteira</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="no-results" id="noResults" style="display:none;">Nenhuma transação encontrada.</div>
    </div>
</div>

<script>
    const API_URL = 'https://gramcatcher-back-end.onrender.com';
    let adminKey = '';

    // ========== LOGIN PERSISTENTE ==========
    window.addEventListener('load', () => {
        const savedKey = localStorage.getItem('gramcatcher_admin_key');
        if (savedKey) {
            adminKey = savedKey;
            loadTransactions(true);
        }
    });

    function doLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if (!user || !pass) {
            document.getElementById('loginError').textContent = 'Preencha todos os campos.';
            return;
        }
        adminKey = pass;
        localStorage.setItem('gramcatcher_admin_key', pass);
        loadTransactions(true);
    }

    function logout() {
        adminKey = '';
        localStorage.removeItem('gramcatcher_admin_key');
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('panel').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }

    // ========== CARREGAR TRANSAÇÕES ==========
    async function loadTransactions(isLogin = false, searchTerm = '') {
        const errorEl = document.getElementById(isLogin ? 'loginError' : 'txError');
        errorEl.textContent = '';
        
        try {
            let url = `${API_URL}/api/admin/transactions`;
            if (searchTerm) {
                url += `?search=${encodeURIComponent(searchTerm)}`;
            }
            
            const res = await fetch(url, {
                headers: { 'x-admin-key': adminKey }
            });
            
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.error || `Erro ${res.status}`);
            }
            
            const transactions = await res.json();
            
            if (isLogin) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            }
            
            renderTable(transactions);
            document.getElementById('pendingCount').textContent = transactions.length;
            
        } catch (e) {
            errorEl.textContent = e.message;
            if (isLogin) {
                adminKey = '';
                localStorage.removeItem('gramcatcher_admin_key');
            }
        }
    }

    // ========== PESQUISA ==========
    function handleSearchKey(e) {
        if (e.key === 'Enter') {
            searchTransactions();
        }
    }

    function searchTransactions() {
        const term = document.getElementById('searchInput').value.trim();
        if (!term) {
            loadTransactions();
            return;
        }
        loadTransactions(false, term);
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        loadTransactions();
    }

    // ========== RENDERIZAR TABELA ==========
    function renderTable(transactions) {
        const tbody = document.querySelector('#txTable tbody');
        const noResults = document.getElementById('noResults');
        tbody.innerHTML = '';
        
        if (!transactions || transactions.length === 0) {
            noResults.style.display = 'block';
            return;
        }
        
        noResults.style.display = 'none';
        
        transactions.forEach(tx => {
            const date = new Date(tx.createdAt).toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const isDeposit = tx.type === 'deposit';
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${date}</td>
                <td>${tx.username || '-'}</td>
                <td>${tx.telegramId}</td>
                <td style="color:${isDeposit ? '#5a9c3f' : '#e0434f'}">${isDeposit ? '📥 Depósito' : '💸 Saque'}</td>
                <td style="color:var(--gold)">${tx.amount.toFixed(2)} GRAM</td>
                <td style="font-size:0.4rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;">${tx.txHash || tx.walletAddress || '-'}</td>
                <td class="status ${tx.status}">${tx.status === 'pending' ? '⏳ Pendente' : tx.status}</td>
                <td class="actions">
                    <button onclick="processTx('${tx._id}', 'approved')" class="green">✅ Aprovar</button>
                    <button onclick="processTx('${tx._id}', 'rejected')">❌ Rejeitar</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // ========== PROCESSAR TRANSAÇÃO ==========
    async function processTx(id, status) {
        const action = status === 'approved' ? 'APROVAR' : 'REJEITAR';
        if (!confirm(`⚠️ Confirmar ${action} esta transação?`)) return;
        
        try {
            const res = await fetch(`${API_URL}/api/admin/transaction/${id}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-key': adminKey
                },
                body: JSON.stringify({ status })
            });
            
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro ao processar');
            
            alert(`✅ Transação ${status === 'approved' ? 'aprovada' : 'rejeitada'} com sucesso!`);
            
            const searchTerm = document.getElementById('searchInput').value.trim();
            loadTransactions(false, searchTerm);
            
        } catch (e) {
            alert('❌ ' + e.message);
        }
    }
</script>
</body>
</html>
